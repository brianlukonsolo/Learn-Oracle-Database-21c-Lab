server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The live status JSON written by the monitor container (shared volume).
    # Never cache it -- the dashboard polls for fresh data.
    location /api/ {
        add_header Cache-Control "no-store, max-age=0";
        try_files $uri =404;
    }

    # Single-page app fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
